<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisor Dashboard - Emotion Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ========== IMPORTS & RESETS ========== */
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius: 1rem;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* ========== LAYOUT ========== */
        .app {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr;
            min-height: 100vh;
        }

        nav {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 70px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 0.5rem;
        }

        nav ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        nav ul li a:hover,
        nav ul li a.active {
            background-color: var(--accent);
            color: white;
        }

        /* Main content */
        .supervisor-main {
            padding: 2rem;
            background-color: var(--bg-primary);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* ========== CARDS ========== */
        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        /* Emotion badges */
        .emotion-badge {
            display: inline-block;
            padding: 0.2em 0.6em;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: capitalize;
        }
        .emotion-badge.happy { background-color: #4caf50; color: white; }
        .emotion-badge.angry { background-color: #f44336; color: white; }
        .emotion-badge.neutral { background-color: #9e9e9e; color: white; }
        .emotion-badge.sad { background-color: #2196f3; color: white; }
        .emotion-badge.fearful { background-color: #ff9800; color: white; }
        .emotion-badge.disgust { background-color: #795548; color: white; }
        .emotion-badge.surprised { background-color: #ffeb3b; color: black; }
        .emotion-badge.calm { background-color: #00bcd4; color: white; }

        /* Agent cards container */
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .agent-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1rem;
            width: 200px;
            box-shadow: var(--shadow-sm);
        }
        .agent-card h3 {
            margin-top: 0;
            margin-bottom: 0.5rem;
        }
        .agent-card p {
            margin: 0.5rem 0;
        }

        /* Historical table */
        .historical-calls input {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            font-size: 1rem;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        .historical-calls input:focus {
            outline: none;
            border-color: var(--accent);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background-color: var(--bg-primary);
            font-weight: 600;
            color: var(--text-primary);
        }
        td {
            color: var(--text-secondary);
        }

        /* Export buttons */
        .export-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .export-buttons button {
            background-color: var(--border);
            color: var(--text-primary);
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .export-buttons button:hover {
            background-color: var(--accent);
            color: white;
        }

        /* Charts container (side by side) */
        .charts-container {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            align-items: center;
        }
        .chart-wrapper {
            flex: 1;
            min-width: 280px;
            text-align: center;
        }
        canvas {
            max-width: 100%;
            height: auto;
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                padding: 0 1rem;
            }
            nav ul li a {
                padding: 0.4rem 0.8rem;
                font-size: 0.85rem;
            }
            .supervisor-main {
                padding: 1rem;
            }
            .charts-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <nav>
        <div class="logo">Emotion Dashboard</div>
        <ul>
            <li><a href="/supervisor" class="active">Dashboard</a></li>
            <!-- Reports link removed -->
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>

    <main class="supervisor-main">
        <h1>Supervisor Dashboard</h1>

        <!-- Historical Call List (searchable) -->
        <div class="historical-calls card">
            <h2>Historical Calls</h2>
            <input type="text" id="searchInput" placeholder="Search by agent, customer, date, emotion...">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Agent</th>
                        <th>Customer</th>
                        <th>Emotion</th>
                        <th>Duration</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Emotion Analytics Charts (Pie + Donut) -->
        <div class="analytics card">
            <h2>Emotion Distribution</h2>
            <div class="charts-container">
                <div class="chart-wrapper">
                    <h3>Pie Chart</h3>
                    <canvas id="emotionPieChart" width="400" height="400"></canvas>
                </div>
                <div class="chart-wrapper">
                    <h3>Donut Chart</h3>
                    <canvas id="emotionDonutChart" width="400" height="400"></canvas>
                </div>
            </div>
        </div>

        <!-- Registered Users -->
        <div class="users card">
            <h2>Registered Users</h2>
            <table id="usersTable">
                <thead>
                    32
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Registered On</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Export Buttons -->
        <div class="export-buttons">
            <button onclick="exportCSV()">Export as CSV</button>
            <button onclick="exportPDF()">Export as PDF</button>
        </div>
    </main>
</div>

<script src="/static/js/supervisor.js" defer></script>
</body>
</html>
