<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account • Emotion Dashboard</title>
    <!-- Your existing main stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Font Awesome 6 (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Additional register-specific refinements */
        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, #eef2ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
            margin: 0;
        }

        .register-container.card {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 2rem 2rem 2.2rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .register-container.card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-header .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .register-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Input groups with icons */
        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.5rem;
            font-size: 0.95rem;
            background-color: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            transition: all 0.2s;
            color: var(--text-primary);
            font-family: inherit;
        }

        .input-group select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1rem;
            padding-right: 2.5rem;
            cursor: pointer;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .input-group input:focus + .input-icon,
        .input-group select:focus + .input-icon {
            color: var(--accent);
        }

        /* Register button */
        .register-btn {
            width: 100%;
            background: linear-gradient(105deg, var(--accent), var(--accent-dark));
            border: none;
            padding: 0.85rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .register-btn:active {
            transform: scale(0.98);
        }

        .register-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error message */
        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            border-left: 4px solid #ef4444;
            color: #ef4444;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .login-link {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Dark mode toggle floating button */
        .dark-mode-toggle {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.6rem 1rem;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .dark-mode-toggle:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }

        /* Responsive */
        @media (max-width: 480px) {
            body { padding: 1rem; }
            .register-container.card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="register-container card">
        <div class="register-header">
            <span class="logo">🧠 Emotion Dashboard</span>
            <p>Create your account to get started</p>
        </div>

        <!-- Dynamic error container (supports server errors) -->
        <div id="errorContainer" style="display: none;" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <form id="registerForm" method="post" action="/register">
            <!-- Full Name -->
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="name" id="name" placeholder="Full Name" required autocomplete="name">
            </div>

            <!-- Email -->
            <div class="input-group">
                <i class="fas fa-envelope input-icon"></i>
                <input type="email" name="email" id="email" placeholder="Email address" required autocomplete="email">
            </div>

            <!-- Password -->
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" id="password" placeholder="Password" required autocomplete="new-password">
            </div>

            <!-- Confirm Password -->
            <div class="input-group">
                <i class="fas fa-check-circle input-icon"></i>
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required autocomplete="off">
            </div>

            <!-- Role Selection -->
            <div class="input-group">
                <i class="fas fa-briefcase input-icon"></i>
                <select name="role" id="role" required>
                    <option value="" disabled selected>Select your role</option>
                    <option value="agent">Agent</option>
                    <option value="supervisor">Supervisor</option>
                </select>
            </div>

            <button type="submit" id="registerBtn" class="register-btn">
                <span>Create Account</span>
            </button>
        </form>

        <div class="login-link">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </div>
    </div>

    <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
        <i class="fas fa-moon"></i>
    </button>

    <script>
        // ==================== DARK MODE ====================
        const darkModeToggle = document.getElementById('darkModeToggle');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        let isDark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && prefersDark);

        function applyDarkMode(enable) {
            if (enable) {
                document.body.classList.add('dark-theme');
                darkModeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                document.body.classList.remove('dark-theme');
                darkModeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            }
            localStorage.setItem('theme', enable ? 'dark' : 'light');
        }

        applyDarkMode(isDark);
        darkModeToggle.addEventListener('click', () => {
            isDark = !isDark;
            applyDarkMode(isDark);
        });

        // ==================== FORM VALIDATION & SUBMISSION ====================
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const errorContainer = document.getElementById('errorContainer');
        const errorTextSpan = document.getElementById('errorText');

        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm_password');

        function showError(message) {
            errorTextSpan.textContent = message;
            errorContainer.style.display = 'flex';
            setTimeout(() => {
                errorContainer.style.display = 'none';
            }, 5000);
        }

        function hideError() {
            errorContainer.style.display = 'none';
        }

        function isValidEmail(email) {
            return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email);
        }

        function validateForm() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value.trim();
            const confirm = confirmInput.value.trim();
            const role = document.getElementById('role').value;

            if (!name) {
                showError('Full name is required.');
                return false;
            }
            if (!email) {
                showError('Email address is required.');
                return false;
            }
            if (!isValidEmail(email)) {
                showError('Please enter a valid email address.');
                return false;
            }
            if (!password) {
                showError('Password cannot be empty.');
                return false;
            }
            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return false;
            }
            if (password !== confirm) {
                showError('Passwords do not match.');
                return false;
            }
            if (!role) {
                showError('Please select a role.');
                return false;
            }
            return true;
        }

        // Real‑time password match validation
        confirmInput.addEventListener('input', () => {
            if (passwordInput.value !== confirmInput.value) {
                confirmInput.setCustomValidity('Passwords do not match');
            } else {
                confirmInput.setCustomValidity('');
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            if (!validateForm()) return;

            const originalHTML = registerBtn.innerHTML;
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="spinner"></span> Creating account...';

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value.trim());
            formData.append('email', document.getElementById('email').value.trim());
            formData.append('password', passwordInput.value.trim());
            formData.append('role', document.getElementById('role').value);

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-Requested-With': 'XMLHttpRequest' }
                });
                const data = await response.json().catch(() => ({}));

                if (response.ok && (data.success || data.redirect)) {
                    window.location.href = data.redirect || '/login';
                } else {
                    showError(data.error || 'Registration failed. Please try again.');
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = originalHTML;
                }
            } catch (err) {
                // Fallback to traditional submit
                registerForm.submit();
            }
        });

        // Capture any server-side error rendered in the original template
        window.addEventListener('DOMContentLoaded', () => {
            const legacyError = document.querySelector('.error'); // from old template
            if (legacyError && legacyError.textContent.trim()) {
                showError(legacyError.textContent.trim());
                legacyError.style.display = 'none';
            }
        });
    </script>
</body>
</html>
